<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 3.1 Pro Multi-Agent Workspace</title>
    <style>
        :root {
            --bg-dark: #0f111a;
            --panel-bg: #1e2130;
            --accent: #8ab4f8;
            --text-main: #e3e6ed;
            --text-dim: #9aa0a6;
            --border: #3c4043;
            --success: #34a853;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        header {
            background-color: var(--panel-bg);
            padding: 10px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-text { font-weight: 800; font-size: 1.2rem; color: var(--accent); }

        .settings-bar { display: flex; gap: 12px; align-items: center; }
        input, select, textarea {
            background: #2d3142;
            color: white;
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
        }
        button {
            background-color: var(--accent);
            color: #0f111a;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { filter: brightness(1.1); }
        button.sec { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }

        /* Main Section */
        main {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }

        .sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 450px;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .label { font-size: 0.75rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; }

        #system-instruction { height: 250px; resize: none; font-size: 0.85rem; }
        #user-input { flex: 1; resize: none; font-size: 1rem; }

        .display {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            background-color: var(--panel-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .display-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #output-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            line-height: 1.7;
            white-space: pre-wrap;
            font-family: 'Consolas', monospace;
            color: #d1d4e0;
        }

        /* Loading */
        .spinner {
            width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite; display: inline-block; margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <div class="logo-text">GEMINI MULTI-AGENT</div>
        <div id="api-status" style="font-size: 0.8rem; color: #ff6b6b;">API 키 필요</div>
    </div>
    <div class="settings-bar">
        <input type="password" id="api-key" placeholder="Google AI Studio API Key">
        <button onclick="saveConfig()">키 저장</button>
        <select id="model-select">
            <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro (Thinking)</option>
            <option value="gemini-1.5-pro-latest">Gemini 1.5 Pro</option>
        </select>
        <button onclick="runAgent()" id="run-btn" style="background: var(--success); color: white;">에이전트 가동</button>
    </div>
</header>

<main>
    <section class="sidebar">
        <div class="input-group">
            <div class="label">System Framework (7-Phase 에이전트)</div>
            <textarea id="system-instruction">당신은 기획자, 데이터 분석가, 수석 디자이너, 시니어 개발자, 화이트해커가 통합된 '올인원 시스템 에이전트'입니다. 다음 워크플로우를 순차적으로 수행하십시오.

### Phase 1: 프롬프트 분석 & 기획 (Planner)
- 사용자의 요청을 분석하여 숨겨진 의도와 기술적 요구사항 정의.

### Phase 2: 정밀 검색 (Researcher)
- 최신 트렌드를 바탕으로 기술 스택 및 현황 리서치.

### Phase 3: UI/UX 설계 (Master Designer)
- 2026년 최신 트렌드(Bento Grid, Glassmorphism 등)를 반영한 최고 수준의 디자인 설계.

### Phase 4: 코드 구현 (Senior Engineer)
- 전체 기능이 포함된 깨끗하고 효율적인 코드 작성.

### Phase 5: 코드 검증 (Independent QA) - 다른 자아
- 버그 및 로직 결함 비판적 검토 및 수정.

### Phase 6: 보안 감사 (Security Specialist)
- OWASP 기준 보안 취약점 점검 및 보안 로직 적용.

### Phase 7: 최종 검토 (Final Reviewer)
- 전체 결과물 요약 및 설계자를 위한 추가 제언.</textarea>
        </div>
        <div class="input-group" style="flex: 1;">
            <div class="label">User Project Idea</div>
            <textarea id="user-input" placeholder="기획하고 싶은 아이디어를 입력하세요."></textarea>
        </div>
    </section>

    <section class="display">
        <div class="display-header">
            <div class="label" id="work-step">AGENT OUTPUT</div>
            <div>
                <button class="sec" onclick="copyResult()">복사</button>
                <button class="sec" onclick="clearOutput()">초기화</button>
            </div>
        </div>
        <div id="output-area">여기에 에이전트의 작업 결과가 단계별로 출력됩니다.</div>
    </section>
</main>

<script>
    window.onload = () => {
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) {
            document.getElementById('api-key').value = savedKey;
            document.getElementById('api-status').innerText = "API 키 로드됨";
            document.getElementById('api-status').style.color = "var(--success)";
        }
    };

    function saveConfig() {
        const key = document.getElementById('api-key').value;
        if (key) {
            localStorage.setItem('gemini_api_key', key);
            document.getElementById('api-status').innerText = "저장 완료";
            document.getElementById('api-status').style.color = "var(--success)";
            alert('설정이 저장되었습니다.');
        }
    }

    function clearOutput() { document.getElementById('output-area').innerText = ""; }
    function copyResult() {
        const text = document.getElementById('output-area').innerText;
        navigator.clipboard.writeText(text).then(() => alert('복사되었습니다.'));
    }

    async function runAgent() {
        const key = localStorage.getItem('gemini_api_key');
        if (!key) return alert('API 키를 저장해주세요.');

        const model = document.getElementById('model-select').value;
        const systemPrompt = document.getElementById('system-instruction').value;
        const userInput = document.getElementById('user-input').value;
        const outputArea = document.getElementById('output-area');
        const runBtn = document.getElementById('run-btn');
        const workStep = document.getElementById('work-step');

        if (!userInput) return alert('아이디어를 입력하세요.');

        outputArea.innerHTML = "";
        runBtn.disabled = true;
        workStep.innerHTML = `<span class="spinner"></span> 에이전트가 사고 중입니다...`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    system_instruction: { parts: [{ text: systemPrompt }] },
                    contents: [{ parts: [{ text: userInput }] }],
                    generationConfig: { temperature: 0.7, maxOutputTokens: 8192 }
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            outputArea.innerText = data.candidates[0].content.parts[0].text;
            workStep.innerText = "작업 완료";
        } catch (error) {
            outputArea.innerHTML = `<span style="color:#ff6b6b">❌ 오류: ${error.message}</span>`;
            workStep.innerText = "오류 발생";
        } finally {
            runBtn.disabled = false;
        }
    }
</script>
</body>
</html>
